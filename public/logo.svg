<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Crosshair circle -->
  <circle cx="50" cy="50" r="35" stroke="#2d9d78" stroke-width="4" fill="none"/>
  <!-- Crosshair lines -->
  <line x1="50" y1="8" x2="50" y2="28" stroke="#2d9d78" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="72" x2="50" y2="92" stroke="#2d9d78" stroke-width="4" stroke-linecap="round"/>
  <line x1="8" y1="50" x2="28" y2="50" stroke="#2d9d78" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="50" x2="92" y2="50" stroke="#2d9d78" stroke-width="4" stroke-linecap="round"/>
  <!-- Football (AFL) -->
  <ellipse cx="50" cy="50" rx="14" ry="20" stroke="#2d9d78" stroke-width="3" fill="none" transform="rotate(-30 50 50)"/>
  <line x1="40" y1="40" x2="60" y2="60" stroke="#2d9d78" stroke-width="2" stroke-linecap="round" transform="rotate(-30 50 50)"/>
</svg>
